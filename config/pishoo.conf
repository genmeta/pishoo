pishoo {
    pid /Users/x/.config/anysee/pishoo.pid;

    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen all 5378;
        server_name borber.pilot~;
        access_rules sqlite:///Users/x/.genmeta/access/rules.db?mode=ro;

        gzip on;
        gzip_comp_level 6;
        gzip_min_length 1100;
        gzip_vary on;
        gzip_types text/html text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        ssl_certificate /Users/x/code/genmeta/gateway/gateway/keychain/borber.pilot.dhttp.net/borber.pilot.dhttp.net.pem;
        ssl_certificate_key /Users/x/code/genmeta/gateway/gateway/keychain/borber.pilot.dhttp.net/borber.pilot.dhttp.net.key;

        location / {
            root            /Users/x/code/genmeta/gateway/chatbot-ui;
            index           index.html;
        }

        location /api/ {
            proxy_pass    http://127.0.0.1:3000/;
            proxy_set_header X-UA $http_user_agent;
            proxy_set_header X-Test $arg_test_id;
            proxy_set_header X-Real-Ip $remote_addr;
        }

        location /ssh {
            ssh_login ssl;
            ssh_deny root;
        }
    }


    server {
        listen all 5378;
        server_name api.borber.pilot~;

        ssl_certificate /Users/x/code/genmeta/gateway/gateway/keychain/borber.pilot.dhttp.net/borber.pilot.dhttp.net.pem;
        ssl_certificate_key /Users/x/code/genmeta/gateway/gateway/keychain/borber.pilot.dhttp.net/borber.pilot.dhttp.net.key;


        location / {
            root            /Users/x/code/genmeta/gateway/chatbot-ui;
            index           index.html;
        }

        location /ssh {
            ssh_login ssl;
            ssh_deny root;
        }

    }
}