pishoo {
    proxy {
        listen 127.0.0.1:5379;

        # 客户端配置 (必需)
        client_name borber.pilot.genmeta.net;
        ssl_certificate /Users/x/code/genmeta/gateway/gateway/keychain/client/signed_certificate.pem;
        ssl_certificate_key /Users/x/code/genmeta/gateway/gateway/keychain/client/test.key;

        allow *.genmeta.net;
        deny doc.genmeta.net api.genmeta.net, daan.genmeta.net;
    }
}