http3 {
    server {
        listen 192.168.31.86:5378 ssl http3;
        server_name test10.genmeta.net;

        ssl_certificate /home/sky/gateway/keychain/test10.genmeta.net.crt;
        ssl_certificate_key /home/sky/gateway/keychain/test10.genmeta.net.key;

        location / {
            proxy_pass      http://127.0.0.1:5500;
        }

        location /v1 {
            proxy_pass      http://127.0.0.1:8080;
        }

    }
}
