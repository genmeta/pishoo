pishoo {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen all 5378;
        server_name test.genmeta.net;

        resolver udp 1.12.74.4:5300;

        ssl_certificate /Users/x/code/genmeta/gateway/gateway/keychain/test.genmeta.net/test.genmeta.net.pem;
        ssl_certificate_key /Users/x/code/genmeta/gateway/gateway/keychain/test.genmeta.net/test.genmeta.net.key;

        location / {
            root            /Users/x/code/genmeta/gateway/chatbot-ui;
            index           index.html;
            add_header    Access-Control-Allow-Origin * always;
        }

        location /v1 {
            proxy_pass      http://127.0.0.1:8080;
            add_header    Access-Control-Allow-Origin *;
            add_header    Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header    Server 'pishoo';
        }

        location /ssh {
            ssh_login basic;
            ssh_deny root;
        }

    }

    server {
        listen all 5380;
        server_name api.test.genmeta.net;

        resolver udp 1.12.74.4:5300;

        ssl_certificate /Users/x/code/genmeta/gateway/gateway/keychain/test.genmeta.net/test.genmeta.net.pem;
        ssl_certificate_key /Users/x/code/genmeta/gateway/gateway/keychain/test.genmeta.net/test.genmeta.net.key;


        location / {
            root            /Users/x/code/genmeta/gateway/chatbot-ui;
            index           index.html;
            add_header    Access-Control-Allow-Origin * always;
        }

        location /ssh {
            ssh_login basic;
            ssh_deny root;
        }

    }
}