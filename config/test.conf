http3 {
    include conf.d/*.conf;

    allow                all;
    deny                 all;

    server {
        listen 192.168.1.51:5378 ssl http3;
        reuse_port on;
        server_name test1.genmeta.net test4.genmeta.net;

        allow           all;
        deny            all;

        ssl_certificate /Users/lixiaofeng/code/gateway/keychain/test1.genmeta.net/test1-genmeta-net-ECC.crt;
        ssl_certificate_key /Users/lixiaofeng/code/gateway/keychain/test1.genmeta.net/test1-genmeta-net-ECC.key;

        location / {
            proxy_pass      http://192.168.1.51:5999;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
        }

        location /static {
            root            /Users/lixiaofeng/code/gateway/nginx;
        }
    }
}