http3 {
    include conf.d/*.conf;

    allow                all;
    deny                 all;

    server {
        listen 127.0.0.1:5378 ssl http3;
        server_name test1.genmeta.net;

        ssl_certificate /Users/x/code/genmeta/gateway/nginx/keychain/test1.genmeta.net/test1-genmeta-net-ECC.crt;
        ssl_certificate_key /Users/x/code/genmeta/gateway/nginx/keychain/test1.genmeta.net/test1-genmeta-net-ECC.key;

        location / {
            allow           all;
            deny            all;
            proxy_pass      http://127.0.0.1:5999;
        }

        location /static {
            allow           all;
            deny            all;
            root            /Users/x/code/genmeta/gateway/nginx;
        }
    }
}