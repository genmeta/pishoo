http3 {
    include conf.d/*.conf;

    allow                all;
    deny                 all;

    server {
        listen 127.0.0.1:5378 ssl http3;
        reuse_port on;
        server_name test1.genmeta.net test4.genmeta.net;

        allow           all;
        deny            all;

        ssl_certificate /Users/x/code/genmeta/gateway_new/nginx/keychain/test1.genmeta.net/test1-genmeta-net-ECC.crt;
        ssl_certificate_key /Users/x/code/genmeta/gateway_new/nginx/keychain/test1.genmeta.net/test1-genmeta-net-ECC.key;

        location / {
            proxy_pass      http://127.0.0.1:5999;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static {
            root            /Users/x/code/genmeta/gateway/nginx;
        }
    }
}