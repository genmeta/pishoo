[package]
name = "gateway"
version = "0.2.0"
edition = "2024"

[[example]]
name = "forward"
path = "examples/forward.rs"


[dependencies]
# --- Core & Error Handling ---
anyhow = { workspace = true }
thiserror = { workspace = true }

# --- Async Runtime & Utilities ---
tokio = { workspace = true }
tokio-stream = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# --- Logging & Tracing ---
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# --- Networking & HTTP ---
bytes = { workspace = true }
h3 = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }

# --- Security & TLS ---
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
getrandom = { workspace = true }

# --- QUIC Implementation ---
gm-quic = { workspace = true }
h3-shim = { workspace = true }
qdns = { workspace = true }
qconnection = { workspace = true }
qtraversal = { workspace = true }
qinterface = { workspace = true }
qevent = { workspace = true, features = ["enabled"] }

# --- Data Structures & Utilities ---
misc-conf = { workspace = true }
regex = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
crossterm = { workspace = true }
rpassword = { workspace = true }
base64 = { workspace = true }
derive_more = { workspace = true, features = ["from"] }

# sshd
nix = { workspace = true, optional = true, features = [
    "fs",
    "ioctl",
    "process",
    "term",
    "user",
] }
pam = { workspace = true, optional = true }
serde_cbor = { workspace = true, optional = true }
tokio-util = { workspace = true }

# socks
dashmap = { workspace = true, optional = true }
socks5-proto = { workspace = true, optional = true }
pin-project-lite = { workspace = true, optional = true }

# --- Platform Specific Dependencies ---
[target.'cfg(any(target_os = "android", target_env = "ohos"))'.dependencies]
pnet = "0.35.0"

[target.'cfg(not(any(target_os = "android", target_env = "ohos")))'.dependencies]
getifs = "0.3"


[dev-dependencies]
clap = { workspace = true }


[features]
default = ["sshd", "socks"]
sshd = [
    "dep:pam",
    "dep:nix",
    "dep:serde_cbor",
    "tokio-util/codec",
    "tokio-util/io",
    "bytes/serde",
]
socks = [
    "sshd",
    "dep:socks5-proto",
    "tokio-util/rt",
    "dep:dashmap",
    "dep:pin-project-lite",
]
qlog = []
