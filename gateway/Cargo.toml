[package]
name = "gateway"
version = "0.4.2"
edition = "2024"

[[example]]
name = "forward"
path = "examples/forward.rs"


[dependencies]
# --- Core & Error Handling ---
snafu = { workspace = true }
thiserror = { workspace = true }

# --- Async Runtime & Utilities ---
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["io", "rt"] }
futures = { workspace = true }
async-trait = { workspace = true }

# --- Logging & Tracing ---
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# --- Networking & HTTP ---
bytes = { workspace = true }
h3 = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
firewall-base = { workspace = true, features = ["http"] }

# --- Security & TLS ---
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
rustls-pemfile = "2"
getrandom = { workspace = true }

# --- QUIC Implementation ---
gm-quic = { workspace = true }
h3-shim = { workspace = true }
qevent = { workspace = true }

# --- DNS resolver ---
gmdns = { workspace = true }
h3x = {workspace = true}

# --- Data Structures & Utilities ---
dashmap = { workspace = true }
misc-conf = { workspace = true }
regex = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
crossterm = { workspace = true }
rpassword = { workspace = true }
base64 = { workspace = true }
derive_more = { workspace = true, features = ["from"] }
form_urlencoded = { workspace = true }
x509-parser = { workspace = true }

genmeta-ssh3-server = { git = "ssh://git@github.com/genmeta/genmeta-ssh3.git", optional = true }
genmeta-home = { workspace = true }
async-compression = { version = "0.4.36", features = ["tokio", "gzip"] }
chrono = "0.4.42"
# genmeta-ssh3-server = { path = "../../genmeta-ssh3/genmeta-ssh3-server", optional = true }

# --- Platform Specific Dependencies ---
[target.'cfg(any(target_os = "android", target_env = "ohos"))'.dependencies]
pnet = "0.35.0"

[target.'cfg(not(any(target_os = "android", target_env = "ohos")))'.dependencies]
getifs = "0.3"


[dev-dependencies]
clap = { workspace = true }


[features]
sshd = ["dep:genmeta-ssh3-server"]
sshd-pam = ["genmeta-ssh3-server/pam"]
stun_traversal = []
qlog = []
