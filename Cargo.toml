[package]
name = "gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
bytes = "1.8"

h3 = "0.0.6"
http = "1"
rustls = { version = "0.23.15", default-features = false, features = ["ring"] }
rustls-webpki = "0.102.8"
rustls-native-certs = "0.8"
thiserror = "2"
dashmap = "6"

gm-quic = "0.1.0"
h3-shim = "0.1.0"
qinterface = "0.1.0"
qconnection = "0.1.0"
qtraversal = "0.1.0"

futures = "0.3"

hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1.10", features = ["tokio"] }

regex = "1"
http-body-util = "0.1"
derive_builder = "0.20"

misc-conf = "0.1"

fastrand = "2"


[patch.crates-io]
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "fix/attck" }
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "fix/attck" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "fix/attck" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "fix/attck" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "fix/attck" }

[patch.'ssh://git@github.com/genmeta/gm-quic-traversal.git']
nat = { git = "ssh://git@github.com/genmeta/mnet.git" }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
