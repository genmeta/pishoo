[package]
name = "gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
# 核心错误处理
anyhow = "1"
thiserror = "2"

# 异步运行时
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1.17"
futures = "0.3"
async-trait = "0.1.83"

# 日志和追踪
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }

# HTTP和网络协议
bytes = "1.10"
h3 = { version = "0.0.6", features = ["tracing"] }
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1.10", features = ["tokio"] }

# TLS和安全
rustls = { version = "0.23.25", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
rustls-webpki = "0.103.0"
getrandom = "=0.3.1"

# QUIC相关
gm-quic = "0.1.0"
h3-shim = "0.1.0"
qconnection = "0.1.0"
qinterface = "0.1.0"
qtraversal = "0.1.0"

# 数据结构和工具
dashmap = "6"
derive_builder = "0.20"
misc-conf = "0.1"
pnet = "0.35.0"
regex = "1"

# ssh
libc = "0.2"
base64 = "0.22"
pwhash = "1"
pam = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"


[dev-dependencies]
clap = { version = "4", features = ["derive"] }

[[example]]
name = "forward"
path = "examples/forward.rs"

[[example]]
name = "pishoo"
path = "examples/pishoo.rs"

[patch.crates-io]
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }

[patch.'ssh://git@github.com/genmeta/gm-quic-traversal.git']
nat = { git = "ssh://git@github.com/genmeta/mnet.git" }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
