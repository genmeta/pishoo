[package]
name = "nginx"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
bytes = "1.8"

h3 = "0.0.6"
http = "1"
rustls = { version = "0.23.15", features = ["ring"] }
rustls-webpki = "0.102.8"
rustls-native-certs = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
h3-shim = "0.0.1"
gm-quic = "0.0.1"


misc-conf = "0.1"
futures = "0.3"
hyper = { version = "1", features = ["http1", "server"] }
hyper-tls = "0.6.0"

regex = "1"
http-body-util = "0.1"
pin-project-lite = "0.2"

[patch.crates-io]
h3-shim = { git = "https://github.com/genmeta/gm-quic", rev = "fc5d8ad4c148cdb9332dca566e70e53180ecf364" }
gm-quic = { git = "https://github.com/genmeta/gm-quic", rev = "fc5d8ad4c148cdb9332dca566e70e53180ecf364" }


[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
