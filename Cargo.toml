[package]
name = "nginx"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = { version = "0.1.40", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
bytes = "1.8"

h3 = "0.0.6"
http = "1"
rustls = { version = "0.23.15", features = ["ring"] }
rustls-webpki = "0.102.8"
rustls-native-certs = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
h3-shim = "0.0.1"
reqwest = { version = "0.12.8", features = ["http3"] }

rusqlite = { version = "0.32", features = ["bundled", "functions"] }

rand = "0.8"

misc-conf = "0.1"
futures = "0.3"

regex = "1"
axum = { version = "0.8.1", features = ["macros"] }


[patch.crates-io]
h3-shim = { git = "https://github.com/genmeta/gm-quic", rev = "fc5d8ad4c148cdb9332dca566e70e53180ecf364" }
gm-quic = { git = "https://github.com/genmeta/gm-quic", rev = "fc5d8ad4c148cdb9332dca566e70e53180ecf364" }
reqwest = { git = "https://github.com/genmeta/reqwest.git", branch = "gm-quic" }


[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
