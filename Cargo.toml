[workspace]
resolver = "2"
members = ["gateway", "pishoo"]


[workspace.dependencies]
# --- Core & Error Handling ---
snafu = "0.8"
thiserror = "2"

# --- Async Runtime & Utilities ---
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
async-trait = "0.1"
tokio-util = "0.7"

# --- Serialization ---
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"
tokio-serde = "0.9"

# --- Logging & Tracing ---
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
console-subscriber = "0.4"

# --- Networking & HTTP ---
bytes = "1"
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
firewall-base = { git = "ssh://git@github.com/genmeta/firewall.git", branch = "main" }
firewall-db = { git = "ssh://git@github.com/genmeta/firewall.git", branch = "main" }

# --- QUIC Implementation ---
gm-quic = { path = "../gm-quic/gm-quic" }
qevent = { path = "../gm-quic/qevent" }

h3x = { path = "../h3x" }

# --- IPC / RPC ---
remoc = { version = "0.18", default-features = false, features = [
    "remoc_macro",
    "rtc",
    "serde",
    "default-codec-json",
] }

# --- DNS (mDNS/HTTP resolver) ---
gmdns = { path = "../gmdns", features = ["h3x-resolver"] }

# --- Security & TLS ---
getrandom = "0.3.1"
rustls = { version = "0.23", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
tokio-rustls = "0.26"

# --- Utilities ---
atty = "0.2"
regex = "1"
parking_lot = "0.12"
misc-conf = "0.1"
clap = { version = "4", features = ["derive"] }
crossterm = { version = "0.29", features = ["events", "event-stream"] }
either = "1"
rpassword = "7.3"
base64 = "0.22"
socks5-proto = "0.4"
derive_more = "2"
dashmap = "6"
pin-project-lite = "0.2"
form_urlencoded = "1"
x509-parser = "0.18"
genmeta-home = { path = "../gmutils/genmeta-home" }

# --- System Interaction ---
libc = "0.2"
nix = "0.30"
pam = "0.7"

# --- Database ORM ---
sea-orm = { version = "1", features = ["runtime-tokio-rustls"] }
sea-orm-migration = { version = "1", features = ["runtime-tokio-rustls"] }

# --- workspace ---
gateway = { path = "gateway", default-features = false }


[patch."https://github.com/genmeta/gmdns.git"]
h3x = { path = "../h3x" }
qdns = { path = "../gm-quic/qdns" }
qinterface = { path = "../gm-quic/qinterface" }

[patch."https://github.com/genmeta/h3x.git"]
gm-quic = { path = "../gm-quic/gm-quic" }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
