[package]
name = "gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
# 核心错误处理
anyhow = "1"
thiserror = "2"

# 异步运行时
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1.17"
futures = "0.3"
async-trait = "0.1.83"

# 日志和追踪
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }

# HTTP和网络协议
bytes = "1.10"
h3 = { version = "0.0.7", features = ["tracing"] }
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1.10", features = ["tokio"] }

# TLS和安全
rustls = { version = "0.23.25", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
getrandom = "=0.3.1"

# QUIC相关
gm-quic = "0.1.0"
h3-shim = "0.1.0"
qconnection = "0.1.0"
qinterface = "0.1.0"
qlog = { version = "0.1.0", features = ["enabled"] }
qtraversal = "0.1.0"

# 数据结构和工具
misc-conf = "0.1"
regex = "1"
parking_lot = "0.12"

[target.'cfg(target_os = "android")'.dependencies]
pnet = "0.35.0"

[target.'cfg(not(target_os = "android"))'.dependencies]
getifs = "0.3"

# ssh
libc = { version = "0.2", optional = true }
base64 = { version = "0.22", optional = true }
pwhash = { version = "1", optional = true }
pam = { version = "0.7", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }


[dev-dependencies]
clap = { version = "4", features = ["derive"] }

[features]
default = []
sshd = [
    "dep:libc",
    "dep:base64",
    "dep:pwhash",
    "dep:pam",
    "dep:serde",
    "dep:serde_json",
]


[[example]]
name = "forward"
path = "examples/forward.rs"

[[example]]
name = "pishoo"
path = "examples/pishoo.rs"

[patch.crates-io]
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }
qlog = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "feat/attack" }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
