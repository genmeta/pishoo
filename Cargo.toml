[workspace]
resolver = "2"
members = ["gateway", "pishoo"]


[workspace.dependencies]
# --- Core & Error Handling ---
anyhow = "1"
thiserror = "2"

# --- Async Runtime & Utilities ---
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
async-trait = "0.1"
tokio-util = "0.7"

# --- Serialization ---
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"
tokio-serde = "0.9"

# --- Logging & Tracing ---
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
console-subscriber = "0.4"

# --- Networking & HTTP ---
bytes = "1"
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
h3 = { version = "0.0.8", features = ["tracing"] }

# --- QUIC Implementation ---
gm-quic = "0.2.3"
h3-shim = "0.2.3"
qdns = "0.2.2"
qconnection = "0.2.3"
qtraversal = "0.2.3"
qinterface = "0.2.3"
qevent = "0.2.3"

# --- Security & TLS ---
rustls = { version = "0.23", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
getrandom = "0.3.1"

# --- Utilities ---
regex = "1"
parking_lot = "0.12"
misc-conf = "0.1"
clap = { version = "4", features = ["derive"] }
crossterm = { version = "0.29", features = ["events", "event-stream"] }
either = "1"
rpassword = "7.3"
base64 = "0.22"
socks5-proto = "0.4"
derive_more = "2"
dashmap = "6"
pin-project-lite = "0.2"
form_urlencoded = "1"

# --- System Interaction ---
libc = "0.2"
nix = "0.30"
pam = "0.7"

[patch.crates-io]
h3-shim = { path = "../gm-quic-traversal/h3-shim" }
gm-quic = { path = "../gm-quic-traversal/gm-quic" }
qdns = { path = "../gm-quic-traversal/qdns" }
qconnection = { path = "../gm-quic-traversal/qconnection" }
qtraversal = { path = "../gm-quic-traversal/qtraversal" }
qinterface = { path = "../gm-quic-traversal/qinterface" }
qevent = { path = "../gm-quic-traversal/qevent" }


[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
