# pishoo/Cargo.toml

[package]
name = "pishoo"
description = "modern, secure, QUIC-powered web/proxy engine"
homepage = "https://pishoo.genmeta.net"
version = "0.3.1"
edition = "2024"

# --- Package Metadata (Debian) ---
[package.metadata.deb]
name = "pishoo"
maintainer = "Genmeta Tech Limited <support@genmeta.net>"
copyright = "Copyright © 2025 Genmeta Tech Limited"
extended-description = """
Pishoo (\"Prosperity Guardian Beast\") is a powerful proxy server optimized for HTTP/3 and end-to-end encrypted communication. Built for privacy and security scenarios, it seamlessly functions as both a forward proxy for client privacy and a reverse proxy to streamline traffic between edge networks and backend services. Its architecture is designed to safeguard your data from infringement and ensures that it can be accessed and utilized securely.
"""
depends = "pishoo-common (>= 0.1.0), $auto"
section = "httpd"
priority = "optional"
assets = [["target/release/pishoo", "usr/bin/", "755"]]

[dependencies]
# --- Workspace Member ---
gateway = { path = "../gateway" }

# --- DNS Publishing & Resolution 
qdns = { workspace = true }

# --- Core & Error Handling ---
snafu = { workspace = true }

# --- Async Runtime ---
tokio = { workspace = true }

# --- CLI Parsing ---
clap = { workspace = true }


# --- Firewall ---
firewall-db = { workspace = true, features = ["sqlx-sqlite"] }

# --- Logging & Tracing ---
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
console-subscriber = { workspace = true, optional = true }

# --- Terminal Detection ---
atty = { workspace = true }

[target.'cfg(unix)'.dependencies]
# --- Signal Handling ---
nix = { workspace = true }

[features]
default = []
sshd = ["gateway/sshd"]
qlog = ["gateway/qlog"]
console_subscriber = ["dep:console-subscriber"]
