# pishoo/Cargo.toml

[package]
name = "pishoo"
description = "modern, secure, QUIC-powered web/proxy engine"
homepage = "https://pishoo.genmeta.net"
version = "0.1.0"
edition = "2024"

# --- Package Metadata (Debian) ---
[package.metadata.deb]
name = "pishoo"
maintainer = " Genmeta QUIC Team <quic_team@genmeta.net>"
copyright = "2025, Genmeta QUIC Team <quic_team@genmeta.net>"
extended-description = """
Pishoo (\"Prosperity Guardian Beast\") is a powerful proxy server optimized for HTTP/3 and end-to-end encrypted communication. Built for privacy and security scenarios, it seamlessly functions as both a forward proxy for client privacy and a reverse proxy to streamline traffic between edge networks and backend services. Its architecture is designed to safeguard your data from infringement and ensures that it can be accessed and utilized securely.
"""
depends = "$auto"
section = "net"
priority = "optional"
assets = [
    [
        "target/release/pishoo",
        "usr/bin/",
        "755",
    ],
    [
        "res/config/pishoo.conf",
        "etc/pishoo/pishoo.conf",
        "644",
    ],
]
maintainer-scripts = "res/systemd/"
systemd-units = { enable = false }

[dependencies]
# --- Workspace Member ---
gateway = { path = "../gateway", features = ["sshd"] }

# --- Core & Error Handling ---
anyhow = { workspace = true }

# --- Async Runtime ---
tokio = { workspace = true }

# --- CLI Parsing ---
clap = { workspace = true }

# --- Logging & Tracing ---
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
