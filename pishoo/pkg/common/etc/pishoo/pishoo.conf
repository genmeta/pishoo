pishoo {
    server {
        listen all 6080;
        server_name your_domain;

        ssl_certificate /etc/pishoo/ssl/your_domain.crt;
        ssl_certificate_key /etc/pishoo/ssl/your_domain.key;

        # example
        location / {
            proxy_pass       http://127.0.0.1:5500;
        }

        # example
        location /v1 {
            proxy_pass       http://127.0.0.1:8080;
        }
    }
}