pishoo {
    # Optional PID file path; defaults to /var/run/pishoo.pid
    pid /var/run/pishoo.pid;

    # When neither workers nor groups are specified, pishoo automatically
    # enumerates all users in the "pishoo" system group as workers. This includes
    # users listed as group members and users whose primary group is "pishoo".
    # If the group is missing, pishoo logs a warning and continues without
    # default workers.
}
