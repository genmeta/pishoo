pishoo {
    # Optional PID file path; defaults to /var/run/pishoo.pid
    pid /var/run/pishoo.pid;

    # When no workers or groups are specified in default global-home mode,
    # pishoo enumerates all users in the platform default worker group.
    # Linux DEB/RPM packages use the "pishoo" group; macOS/Homebrew uses "_www".
}
