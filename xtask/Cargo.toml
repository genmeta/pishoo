[package]
name = "xtask"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
bollard = "0.19"
cargo_metadata = "0.19"
clap = { version = "4", features = ["derive"] }
flate2 = "1"
futures-util = "0.3"
sha2 = "0.10"
snafu = "0.8"
tar = "0.4"
tokio = { version = "1", features = ["full"] }
xshell = "0.2"
