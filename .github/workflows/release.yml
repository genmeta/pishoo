name: Release

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  XTASK_RELEASE_S3_ENDPOINT_URL: ${{ vars.XTASK_RELEASE_S3_ENDPOINT_URL }}
  DHTTP_STUN_SERVER: ${{ vars.DHTTP_STUN_SERVER }}
  DHTTP_H3_DNS_SERVER: ${{ vars.DHTTP_H3_DNS_SERVER }}
  DHTTP_HTTP_DNS_SERVER: ${{ vars.DHTTP_HTTP_DNS_SERVER }}
  DHTTP_MDNS_SERVICE: ${{ vars.DHTTP_MDNS_SERVICE }}
  DHTTP_CERT_SERVER_URL: ${{ vars.DHTTP_CERT_SERVER_URL }}

jobs:
  linux-deb:
    name: Linux deb packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gateway/keychain/root.crt
      RELEASE_BUCKET: download
      APT_SUITE: stable
      APT_PREFIX: apt/pishoo
      LINUX_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu armv7-unknown-linux-gnueabihf i686-unknown-linux-gnu
    defaults:
      run:
        shell: bash
        working-directory: gateway
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: gateway
          persist-credentials: false


      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gateway-linux-deb-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            gateway-linux-deb-cargo-

      - name: Install Linux deb tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends gpg
          docker info

      - name: Validate release configuration and derive APT fingerprint
        id: apt_key
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            XTASK_RELEASE_APT_SIGNING_KEY
            XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit "$missing"
          fi

          key_file="$RUNNER_TEMP/apt-signing-key.asc"
          install -m 700 -d "$(dirname "$key_file")"
          printf '%s' "$XTASK_RELEASE_APT_SIGNING_KEY" > "$key_file"
          fingerprint="$(gpg --batch --import-options show-only --with-colons --import "$key_file" \
            | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          rm -f "$key_file"
          if [ -z "$fingerprint" ]; then
            echo "failed to derive APT signing key fingerprint" >&2
            exit 1
          fi
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Package deb artifacts
        run: |
          deb_args=(--target common)
          for target in ${LINUX_TARGETS}; do
            deb_args+=(--target "$target")
          done
          if [ "${#deb_args[@]}" -eq 0 ]; then
            echo "linux_targets must not be empty" >&2
            exit 1
          fi

          cargo xtask package --overwrite-manifest \
            deb "${deb_args[@]}" --features sshd,pam

      - name: Publish S3 for deb artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
          APT_SIGNING_FINGERPRINT: ${{ steps.apt_key.outputs.fingerprint }}
        run: |
          set -euo pipefail
          export XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            deb --prefix "$APT_PREFIX" --suite "$APT_SUITE" --fingerprint "$APT_SIGNING_FINGERPRINT"

      - name: Upload deb manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-deb-release
          if-no-files-found: ignore
          path: |
            gateway/target/common/deb/**

  linux-rpm:
    name: Linux rpm packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gateway/keychain/root.crt
      RELEASE_BUCKET: download
      RPM_PREFIX: rpm/pishoo
      # Fedora 40 RPM repositories no longer provide armhfp/armv7hl metadata.
      RPM_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu i686-unknown-linux-gnu
    defaults:
      run:
        shell: bash
        working-directory: gateway
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: gateway
          persist-credentials: false


      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gateway-linux-rpm-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            gateway-linux-rpm-cargo-

      - name: Install Linux rpm tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends rpm
          docker info

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Package rpm artifacts
        run: |
          rpm_args=(--target common)
          for target in ${RPM_TARGETS}; do
            rpm_args+=(--target "$target")
          done
          if [ "${#rpm_args[@]}" -eq 0 ]; then
            echo "linux_targets must not be empty" >&2
            exit 1
          fi

          cargo xtask package --overwrite-manifest \
            rpm "${rpm_args[@]}" --features sshd,pam

      - name: Publish S3 for rpm artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            rpm --prefix "$RPM_PREFIX"

      - name: Upload rpm manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-rpm-release
          if-no-files-found: ignore
          path: |
            gateway/target/common/rpm/**

  homebrew:
    name: Homebrew package and S3 publish
    runs-on: macos-15
    timeout-minutes: 120
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gateway/keychain/root.crt
      RELEASE_BUCKET: download
      BREW_PREFIX: brew/pishoo
      BREW_PUBLIC_BASE_URL: https://download.dhttp.net/brew/pishoo
      HOMEBREW_TAP_REPOSITORY: genmeta/homebrew-genmeta
      HOMEBREW_TAP_BASE_BRANCH: main
    defaults:
      run:
        shell: bash
        working-directory: gateway
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: gateway
          persist-credentials: false

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            HOMEBREW_TAP_GITHUB_TOKEN
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout Homebrew tap
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          ref: ${{ env.HOMEBREW_TAP_BASE_BRANCH }}
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gateway-macos-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            gateway-macos-cargo-

      - name: Package Homebrew artifacts
        run: |
          cargo xtask package --overwrite-manifest \
            brew \
              --target aarch64-apple-darwin \
              --target x86_64-apple-darwin \
              --features sshd

      - name: Publish S3 for Homebrew artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            brew --prefix "$BREW_PREFIX" --public-base-url "$BREW_PUBLIC_BASE_URL"

      - name: Create Homebrew tap pull request
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          FORMULA_NAME: pishoo.rb
        run: |
          set -euo pipefail
          tap_dir="$GITHUB_WORKSPACE/homebrew-tap"
          formula_source="$PWD/target/common/brew/$FORMULA_NAME"
          formula_dest="$tap_dir/$FORMULA_NAME"
          test -f "$formula_source"

          cp "$formula_source" "$formula_dest"

          cd "$tap_dir"
          if [[ -z "$(git status --porcelain -- "$FORMULA_NAME")" ]]; then
            echo "homebrew tap formula is unchanged"
            exit 0
          fi

          branch="release/${GITHUB_REPOSITORY##*/}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add "$FORMULA_NAME"
          git commit -m "brew: update $FORMULA_NAME"
          git push origin "$branch"
          gh pr create \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --base "$HOMEBREW_TAP_BASE_BRANCH" \
            --head "$branch" \
            --title "brew: update $FORMULA_NAME from gateway" \
            --body "Generated by $GITHUB_REPOSITORY release $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT."

      - name: Upload Homebrew manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-homebrew-release
          if-no-files-found: ignore
          path: |
            gateway/target/common/brew/**
