  homebrew:
    needs: github-release
    name: Homebrew package and S3 publish
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
        working-directory: gateway
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: gateway
          persist-credentials: false

      - name: Materialize DHTTP root CA
        run: |
          set -euo pipefail
          if [ -z "${DHTTP_ROOT_CA_PEM:-}" ]; then
            echo "missing required release configuration: DHTTP_ROOT_CA_PEM" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$DHTTP_ROOT_CA")"
          python3 - <<'PY' > "$DHTTP_ROOT_CA"
          import os

          pem = os.environ["DHTTP_ROOT_CA_PEM"]
          print(pem.replace("\\n", "\n"), end="" if pem.endswith("\n") else "\n")
          PY

      - name: Install Rust
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Read Homebrew tap destination
        id: homebrew_destination
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: cargo xtask show s3-destination brew --github-output >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_ROOT_CA
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            HOMEBREW_TAP_GITHUB_TOKEN
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout Homebrew tap
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.homebrew_destination.outputs.repository }}
          ref: ${{ steps.homebrew_destination.outputs.base_branch }}
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gateway-macos-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            gateway-macos-cargo-

      - name: Package Homebrew artifacts
        run: |
          cargo xtask package --overwrite-manifest \
            brew \
              --target aarch64-apple-darwin \
              --target x86_64-apple-darwin \
              --features sshd

      - name: Publish S3 for Homebrew artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" --publish-report target/publish-reports/brew.toml brew

      - name: Create Homebrew tap pull request
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ steps.homebrew_destination.outputs.repository }}
          HOMEBREW_TAP_BASE_BRANCH: ${{ steps.homebrew_destination.outputs.base_branch }}
          FORMULA_NAME: pishoo.rb
        run: |
          set -euo pipefail
          tap_dir="$GITHUB_WORKSPACE/homebrew-tap"
          formula_source="$PWD/target/common/brew/$FORMULA_NAME"
          formula_dest="$tap_dir/$FORMULA_NAME"
          test -f "$formula_source"

          cp "$formula_source" "$formula_dest"

          cd "$tap_dir"
          if [[ -z "$(git status --porcelain -- "$FORMULA_NAME")" ]]; then
            echo "homebrew tap formula is unchanged"
            exit 0
          fi

          branch="publish/pishoo/${GITHUB_REF_NAME}"
          commit_message="feat: release pishoo ${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add "$FORMULA_NAME"
          git commit -m "$commit_message"
          git push --force-with-lease origin "$branch"

          existing_pr="$(
            gh pr list \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --base "$HOMEBREW_TAP_BASE_BRANCH" \
              --head "$branch" \
              --state open \
              --json number \
              --jq '.[0].number // ""'
          )"
          if [[ -n "$existing_pr" ]]; then
            echo "homebrew tap pull request #$existing_pr already exists"
          else
            gh pr create \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --base "$HOMEBREW_TAP_BASE_BRANCH" \
              --head "$branch" \
              --title "publish pishoo ${GITHUB_REF_NAME}" \
              --body "Generated by $GITHUB_REPOSITORY release ${GITHUB_REF_NAME}."
          fi

      - name: Upload Homebrew packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report=target/publish-reports/brew.toml
          test -f "$report"
          assets=()
          while IFS= read -r asset; do
            assets+=("$asset")
          done < <(python3 - "$report" <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as handle:
              report = tomllib.load(handle)

          for manifest in report.get("manifests", []):
              for asset in manifest.get("artifacts", []):
                  print(asset["local-path"])
          PY
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no Homebrew release assets selected by publish report; skipping GitHub Release upload"
            exit 0
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload Homebrew manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-homebrew-release
          if-no-files-found: ignore
          path: |
            gateway/target/common/brew/**
            gateway/target/publish-reports/*.toml
