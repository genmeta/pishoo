name: Release

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  XTASK_RELEASE_S3_ENDPOINT_URL: ${{ vars.XTASK_RELEASE_S3_ENDPOINT_URL }}
  DHTTP_ROOT_CA_PEM: ${{ secrets.DHTTP_ROOT_CA_PEM }}
  DHTTP_ROOT_CA: ${{ github.workspace }}/.release/dhttp-root-ca.pem
  DHTTP_STUN_SERVER: ${{ vars.DHTTP_STUN_SERVER }}
  DHTTP_H3_DNS_SERVER: ${{ vars.DHTTP_H3_DNS_SERVER }}
  DHTTP_HTTP_DNS_SERVER: ${{ vars.DHTTP_HTTP_DNS_SERVER }}
  DHTTP_MDNS_SERVICE: ${{ vars.DHTTP_MDNS_SERVICE }}
  DHTTP_CERT_SERVER_URL: ${{ vars.DHTTP_CERT_SERVER_URL }}

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Skip GitHub Release for dry-run
        if: ${{ !(github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
        run: echo "not a v* tag; skipping GitHub Release creation"

      - name: Checkout tag
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/$GITHUB_REF_NAME"
          git fetch --force origin "$tag_ref:$tag_ref"
          tag_object="$(git rev-parse "$tag_ref^{tag}" 2>/dev/null || true)"
          target_commit="$(git rev-parse "$tag_ref^{commit}")"
          notes_file="$RUNNER_TEMP/release-notes.md"
          git for-each-ref "$tag_ref" --format='%(contents)' > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            git log -1 --format=%B "$target_commit" > "$notes_file"
          fi
          {
            printf '\n## Authentication and provenance\n\n'
            printf -- '- Tag: `%s`\n' "$GITHUB_REF_NAME"
            if [ -n "$tag_object" ]; then
              printf -- '- Annotated tag object: `%s`\n' "$tag_object"
            else
              printf -- '- Tag object: lightweight tag\n'
            fi
            printf -- '- Target commit: `%s`\n' "$target_commit"
            printf -- '- Workflow run: %s/%s/actions/runs/%s\n' \
              "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Workflow attempt: `%s`\n' "$GITHUB_RUN_ATTEMPT"
            printf -- '- Published by: GitHub Actions `%s` workflow\n' "$GITHUB_WORKFLOW"
          } >> "$notes_file"

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "github release $GITHUB_REF_NAME already exists"
            exit 0
          fi

          release_args=()
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            release_args+=(--prerelease --latest=false)
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$notes_file" \
            "${release_args[@]}"

  linux-deb:
    needs: github-release
    name: Linux deb packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      LINUX_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu armv7-unknown-linux-gnueabihf i686-unknown-linux-gnu
    defaults:
      run:
        shell: bash
        working-directory: gateway
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: gateway
          persist-credentials: false

      - name: Materialize DHTTP root CA
        run: |
          set -euo pipefail
          if [ -z "${DHTTP_ROOT_CA_PEM:-}" ]; then
            echo "missing required release configuration: DHTTP_ROOT_CA_PEM" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$DHTTP_ROOT_CA")"
          python3 - <<'PY' > "$DHTTP_ROOT_CA"
          import os

          pem = os.environ["DHTTP_ROOT_CA_PEM"]
          print(pem.replace("\\n", "\n"), end="" if pem.endswith("\n") else "\n")
          PY


      - name: Install Rust
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gateway-linux-deb-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            gateway-linux-deb-cargo-

      - name: Install Linux deb tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends gpg
          docker info

      - name: Validate release configuration and derive APT fingerprint
        id: apt_key
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_ROOT_CA
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            XTASK_RELEASE_APT_SIGNING_KEY
            XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit "$missing"
          fi

          key_file="$RUNNER_TEMP/apt-signing-key.asc"
          install -m 700 -d "$(dirname "$key_file")"
          printf '%s' "$XTASK_RELEASE_APT_SIGNING_KEY" > "$key_file"
          fingerprint="$(gpg --batch --import-options show-only --with-colons --import "$key_file" \
            | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          rm -f "$key_file"
          if [ -z "$fingerprint" ]; then
            echo "failed to derive APT signing key fingerprint" >&2
            exit 1
          fi
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Package deb artifacts
        run: |
          deb_args=(--target common)
          for target in ${LINUX_TARGETS}; do
            deb_args+=(--target "$target")
          done
          if [ "${#deb_args[@]}" -eq 0 ]; then
            echo "linux_targets must not be empty" >&2
            exit 1
          fi

          cargo xtask package --overwrite-manifest \
            deb "${deb_args[@]}" --features sshd,pam

      - name: Publish S3 for deb artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
          XTASK_RELEASE_APT_SIGNING_FINGERPRINT: ${{ steps.apt_key.outputs.fingerprint }}
        run: |
          set -euo pipefail
          export XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" --publish-report target/publish-reports/deb.toml deb

      - name: Upload deb packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report=target/publish-reports/deb.toml
          test -f "$report"
          assets=()
          while IFS= read -r asset; do
            assets+=("$asset")
          done < <(python3 - "$report" <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as handle:
              report = tomllib.load(handle)

          for manifest in report.get("manifests", []):
              for asset in manifest.get("artifacts", []):
                  print(asset["local-path"])
          PY
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no deb release assets selected by publish report; skipping GitHub Release upload"
            exit 0
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload deb manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-deb-release
          if-no-files-found: ignore
          path: |
            gateway/target/common/deb/**
            gateway/target/publish-reports/*.toml

  linux-rpm:
    needs: github-release
    name: Linux rpm packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      # Fedora 40 RPM repositories no longer provide armhfp/armv7hl metadata.
      RPM_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu i686-unknown-linux-gnu
    defaults:
